server:
  port: 8080

spring:
  application:
    name: java-frame-table
  # MySQL 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://localhost:3306/virgil-dev?zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true"
    username: root
    password: 34821015
  jackson:
    # 日期时间格式反序列化
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

# MyBatis-Plus 配置
mybatis-plus:
  # 实体类扫描路径
  type-aliases-package: org.virgil.javaframetable.entity
  # Mapper XML 文件位置
  mapper-locations: classpath*:/**/mapper/xml/*.xml
  configuration:
    # 开启驼峰命名转换（数据库字段 user_name -> 实体类 userName）
    map-underscore-to-camel-case: true
    # 打印 SQL 日志（开发环境建议开启）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 主键策略（自增）
      id-type: AUTO
      # 逻辑删除字段
      logic-delete-field: flagDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0


