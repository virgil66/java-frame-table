# 自定义日志配置
log:
  config:
    path: /Users/mac/forten/resources/java-frame-base/03logs # 日志文件路径
    max-history: 30 # 日志文件保留天数
    max-file-size: 100MB # 单个日志文件最大大小
    max-file-size-error: 50MB # 错误日志文件最大大小
    total-size-cap: 10GB # 日志文件总大小上限
    immediate-flush: false # 默认false
    root-level: DEBUG # 根日志级别
    clean-history-on-start: true # 启动时清理历史日志
